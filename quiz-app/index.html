<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

    <!-- Start Screen -->
    <div id="start-screen" class="screen">
      <h1>Quiz App</h1>
      <p>Test your knowledge with multiple-choice questions.</p>

      <div class="difficulty-selector">
        <span class="difficulty-label">Difficulty</span>
        <div class="difficulty-buttons">
          <button class="diff-btn active" data-difficulty="all">All</button>
          <button class="diff-btn" data-difficulty="easy">Easy</button>
          <button class="diff-btn" data-difficulty="medium">Medium</button>
          <button class="diff-btn" data-difficulty="hard">Hard</button>
        </div>
      </div>

      <button id="start-btn">Start Quiz</button>

      <!-- Leaderboard -->
      <div id="leaderboard-section" class="leaderboard-section hidden">
        <h3>Leaderboard</h3>
        <ol id="leaderboard-list"></ol>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen hidden">
      <div class="quiz-header">
        <span class="progress-label">Question <span id="current-q">1</span> of <span id="total-q">5</span></span>
        <div class="timer">
          <svg class="timer-ring" viewBox="0 0 40 40">
            <circle class="timer-ring-bg" cx="20" cy="20" r="16"/>
            <circle id="timer-ring-fill" class="timer-ring-fill" cx="20" cy="20" r="16"/>
          </svg>
          <span id="timer-text">15</span>
        </div>
      </div>
      <div class="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <div class="question-card">
        <p id="question-text"></p>
        <ul id="options-list"></ul>
      </div>
      <button id="next-btn" disabled>Next</button>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="screen hidden">
      <h2>Quiz Complete!</h2>
      <p class="score-display">Your Score: <span id="score"></span> / <span id="total"></span></p>
      <p id="score-message"></p>

      <!-- Past Attempts -->
      <div id="history-section" class="history-section hidden">
        <h3>Past Attempts</h3>
        <ul id="history-list"></ul>
      </div>

      <div class="result-actions">
        <button id="restart-btn">Try Again</button>
        <button id="home-btn" class="btn-secondary">Home</button>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
